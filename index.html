<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>STARCODE64</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#020617,#070b20);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.container{
text-align:center;
}

.title{
font-size:32px;
letter-spacing:2px;
margin-bottom:20px;
}

.card{
width:340px;
height:520px;
overflow:hidden;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);
}

.slider{
display:flex;
width:1360px;
transition:.5s;
}

.screen{
width:340px;
padding:30px;
box-sizing:border-box;
}

.start{
font-size:48px;
color:#ff3b3b;
margin-top:40px;
}

.circle{
width:220px;
height:220px;
margin:30px auto;
border-radius:50%;
background:radial-gradient(circle,#111 0%,#020617 70%);
box-shadow:0 0 40px rgba(120,120,255,.3);
}

.input{
margin:20px 0;
opacity:.8;
}

button{
margin-top:20px;
padding:10px 20px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#6366f1,#8b5cf6);
color:white;
}

.code{
font-size:28px;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<div class="title">STAR CODE64</div>

<div class="card">

<div class="slider" id="slider">

<!-- 画面1 -->
<div class="screen">

<div class="start">START</div>

<div class="circle"></div>

<button onclick="go(1)">START</button>

</div>

<!-- 画面2 -->
<div class="screen">

<div class="input">Enter birth date</div>
<div class="input">Enter birth time</div>
<div class="input">Enter birth place</div>

<button onclick="go(2)">Diagnose</button>

</div>

<!-- 画面3 -->
<div class="screen">

<div>あなたの意識コードを診断します</div>

<div class="code">あなたのコード : 10</div>

<div class="circle"></div>

<button onclick="go(3)">詳細</button>

</div>

<!-- 画面4 -->
<div class="screen">

<div style="font-size:24px;margin-bottom:20px;">
Diagnosis Result
</div>

<div class="circle"></div>

<div style="margin-top:20px;">
ここに詳細文章
</div>

<button onclick="go(0)">戻る</button>

</div>

</div>
</div>

</div>

<script>

function go(n){

document.getElementById("slider")
.style.transform="translateX(-"+(n*340)+"px)"

}

</script>

</body>
</html>
