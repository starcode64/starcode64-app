<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スターコード64</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#05070f;
color:white;
}

.screen{
display:none;
min-height:100vh;
padding:40px;
}

.active{display:block;}

input{
display:block;
margin:10px 0;
padding:12px;
width:260px;
background:#151a2f;
border:1px solid #2a3355;
color:white;
border-radius:6px;
}

button{
padding:12px 18px;
background:#4a7dff;
border:none;
color:white;
border-radius:6px;
}

#resultText{
white-space:pre-line;
margin-top:20px;
padding:15px;
background:#11182c;
border-radius:8px;
}

canvas{
margin-top:20px;
}
</style>
</head>

<body>

<div id="startScreen" class="screen active">
<h1>STAR CODE 64</h1>
<button onclick="show('inputScreen')">START</button>
</div>

<div id="inputScreen" class="screen">
<h2>入力</h2>

<input id="birthDate" placeholder="生年月日 1990-01-01">
<input id="birthTime" placeholder="出生時刻 12:30">
<input id="birthPlace" placeholder="出生地">

<button onclick="run()">診断</button>
</div>

<div id="resultScreen" class="screen">
<h2>診断結果</h2>
<div id="resultText"></div>
<canvas id="canvas" width="400" height="400"></canvas>
<br>
<button onclick="show('inputScreen')">戻る</button>
</div>

<script>

let stats=[];

function show(id){
document.querySelectorAll(".screen").forEach(e=>e.classList.remove("active"))
document.getElementById(id).classList.add("active")
}

function run(){

let d=document.getElementById("birthDate").value
let t=document.getElementById("birthTime").value
let p=document.getElementById("birthPlace").value

let seed=(d+t+p).split("").reduce((a,b)=>a+b.charCodeAt(0),0)

stats=[]

for(let i=0;i<64;i++){
let v=Math.abs(Math.sin(seed*(i+1))*10)
stats.push(v)
}

show("resultScreen")
render()
}

function draw(){

const c=document.getElementById("canvas")
const ctx=c.getContext("2d")

ctx.clearRect(0,0,400,400)

let cx=200
let cy=200
let r=150

for(let i=0;i<64;i++){

let a=(Math.PI*2/64)*i
let v=stats[i]/10

let x=cx+Math.cos(a)*r*v
let y=cy+Math.sin(a)*r*v

ctx.beginPath()
ctx.arc(x,y,3,0,Math.PI*2)
ctx.fillStyle="#6bd4ff"
ctx.fill()
}

ctx.beginPath()
ctx.arc(cx,cy,r,0,Math.PI*2)
ctx.strokeStyle="#333"
ctx.stroke()
}

function getReport(){

let domain=Array(8).fill(0)

for(let i=0;i<64;i++){
domain[i%8]+=stats[i]
}

let max=0
let dom=0

for(let i=0;i<8;i++){
if(domain[i]>max){
max=domain[i]
dom=i
}
}

let min=999
let weak=0

for(let i=0;i<8;i++){
if(domain[i]<min){
min=domain[i]
weak=i
}
}

let today=new Date().getDate()%8

const name=[
"自己認識",
"関係性",
"行動",
"適応",
"思考",
"感情",
"時間",
"直感"
]

return `
コア領域
${name[dom]}

思考傾向
${name[dom]}優位の判断

行動傾向
${name[dom]}中心行動

今日の影響
${name[today]}

注意領域
${name[weak]}

総合
${name[dom]}優位構造
`
}

function render(){
document.getElementById("resultText").innerText=getReport()
draw()
}

</script>

</body>
</html>
