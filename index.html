<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スターコード64 - K段階（完成）</title>

<style>
body {
  background:#0b0f1a;
  color:#fff;
  font-family: sans-serif;
  text-align:center;
}

.outerCircle {
  width: 520px;
  height: 520px;
  border: 2px solid #2a3a55;
  border-radius: 50%;
  margin: 40px auto;
  position: relative;
  animation: rotate 40s linear infinite;
}

.innerCircle {
  width: 340px;
  height: 340px;
  border: 2px solid #3a4f6e;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  animation: rotateReverse 25s linear infinite;
}

.segment {
  position: absolute;
  width: 2px;
  height: 260px;
  background: rgba(255,255,255,0.05);
  top: 0;
  left: 50%;
  transform-origin: bottom;
}

.dotOuter, .dotInner {
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  transition: all 0.6s ease;
  box-shadow: 0 0 16px;
}

.observer {
  width: 10px;
  height: 10px;
  background: #ffffff;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 10px #ffffff;
}

#codeDisplay, #stateDisplay, #autoDisplay {
  font-size: 14px;
  margin-top: 10px;
  white-space: pre-line;
  color:#7df9ff;
}

button {
  padding:10px 20px;
  font-size:16px;
  margin-top:20px;
}

@keyframes rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes rotateReverse {
  0% { transform: translate(-50%,-50%) rotate(0deg); }
  100% { transform: translate(-50%,-50%) rotate(-360deg); }
}

</style>
</head>

<body>

<h2>スターコード64 - K段階（自己生成完成モデル）</h2>

<div class="outerCircle" id="outerCircle">

  <div class="observer"></div>

  <div class="innerCircle">
    <div class="dotInner" id="dotInner"></div>
  </div>

  <div class="dotOuter" id="dotOuter"></div>

</div>

<input id="inputCode" placeholder="コード（1〜64）">
<br>
<button onclick="runCode()">手動実行</button>
<button onclick="toggleAuto()">自動モード</button>

<div id="codeDisplay">コード：--</div>
<div id="stateDisplay">状態：--</div>
<div id="autoDisplay">自動：OFF</div>

<script>

const TOTAL = 64;
const radiusOuter = 210;
const radiusInner = 120;

const stats = Array(64).fill(0);
const history = [];

let autoMode = false;
let autoInterval = null;

// 円
const outerCircle = document.getElementById("outerCircle");

for(let i=0;i<TOTAL;i++){
  const line = document.createElement("div");
  line.className = "segment";
  line.style.transform = `rotate(${i * (360 / TOTAL)}deg)`;
  outerCircle.appendChild(line);
}

// 移動
function move(code){

  const angle = (code - 1) * (360 / TOTAL);
  const rad = angle * Math.PI / 180;

  const x = Math.cos(rad) * radiusOuter;
  const y = Math.sin(rad) * radiusOuter;

  document.getElementById("dotOuter").style.transform =
    `translate(-50%, -50%) translate(${x}px, ${y}px)`;
}

// 内円
function moveInner(code){

  const angle = (code - 1) * (360 / TOTAL);
  const rad = angle * Math.PI / 180;

  const x = Math.cos(rad) * radiusInner;
  const y = Math.sin(rad) * radiusInner;

  document.getElementById("dotInner").style.transform =
    `translate(-50%, -50%) translate(${x}px, ${y}px)`;
}

// 状態分析
function analyzeState(){

  let total = 0;
  let max = 0;

  for(let i=0;i<64;i++){
    total += stats[i];
    if(stats[i] > max) max = stats[i];
  }

  const ratio = max / (total || 1);

  if(total < 5) return "未収束";
  if(ratio > 0.6) return "集中";
  if(ratio > 0.3) return "安定";
  return "拡散";
}

// 予測（最頻）
function predict(){

  let max = 0;
  let idx = 0;

  for(let i=0;i<64;i++){
    if(stats[i] > max){
      max = stats[i];
      idx = i;
    }
  }

  return idx + 1;
}

// 実行
function runCode(codeInput){

  let code;

  if(typeof codeInput === "number"){
    code = codeInput;
  } else {
    code = parseInt(document.getElementById("inputCode").value);
  }

  if(isNaN(code) || code < 1 || code > 64){
    return;
  }

  history.push(code);
  stats[code - 1]++;

  move(code);
  moveInner(code);

  document.getElementById("codeDisplay").innerText =
    "コード：" + code +
    "\n履歴：" + history.slice(-10).join(" → ");

  document.getElementById("stateDisplay").innerText =
    "状態：" + analyzeState() +
    "\n予測：" + predict();
}

// 自動生成
function autoStep(){
  const next = predict();
  runCode(next);
}

// 自動切替
function toggleAuto(){

  autoMode = !autoMode;

  document.getElementById("autoDisplay").innerText =
    "自動：" + (autoMode ? "ON" : "OFF");

  if(autoMode){
    autoInterval = setInterval(autoStep, 2000);
  } else {
    clearInterval(autoInterval);
  }
}

</script>

</body>
</html>
