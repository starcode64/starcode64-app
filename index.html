<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スターコード64</title>

<style>
body{
  margin:0;
  font-family: "Helvetica Neue", sans-serif;
  background: radial-gradient(circle at top, #0b1020, #05060a);
  color:#e6e6e6;
}

/* ■ 画面 */
.screen{
  display:none;
  min-height:100vh;
  padding:40px;
  box-sizing:border-box;
}

.active{
  display:block;
}

/* =========================
   ■ スタート画面
========================= */
#startScreen{
  text-align:center;
  background: radial-gradient(circle at center, #1a1f3a, #05060a);
}

#startScreen h1{
  font-size:30px;
  letter-spacing:3px;
  margin-top:120px;
}

#startScreen p{
  opacity:0.7;
  margin-bottom:40px;
}

/* =========================
   ■ 入力画面
========================= */
#inputScreen{
  background: linear-gradient(180deg, #0c1224, #05060a);
}

input{
  display:block;
  margin:12px 0;
  padding:12px;
  width:260px;
  border:none;
  border-radius:6px;
  background:#151a2f;
  color:#fff;
  outline:none;
  border:1px solid #2a3355;
}

input:focus{
  border-color:#5aa7ff;
  box-shadow:0 0 10px rgba(90,167,255,0.3);
}

button{
  padding:12px 18px;
  margin-top:14px;
  border:none;
  border-radius:6px;
  background: linear-gradient(90deg,#4a7dff,#6bd4ff);
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

/* =========================
   ■ 結果画面
========================= */
#resultScreen{
  background: radial-gradient(circle at center, #070a14, #02030a);
}

#resultText{
  white-space: pre-line;
  margin-top:20px;
  padding:15px;
  border:1px solid #2a3355;
  background: rgba(20,25,50,0.5);
  border-radius:8px;
}

/* ■ 円グラフ */
canvas{
  margin-top:20px;
  border-radius:50%;
  background: radial-gradient(circle at center, #0a0f22, #02030a);
  box-shadow:0 0 30px rgba(90,167,255,0.15);
}

/* ■ 戻るボタン */
.backBtn{
  background:#222b44;
  color:#fff;
}
</style>
</head>

<body>

<!-- =========================
■ スタート画面
========================= -->
<div id="startScreen" class="screen active">

  <h1>STAR CODE 64</h1>
  <p>Self Structure Analysis System</p>

  <button onclick="goInput()">ENTER SYSTEM</button>

</div>

<!-- =========================
■ 入力画面
========================= -->
<div id="inputScreen" class="screen">

  <h2>入力</h2>

  <input id="birthDate" placeholder="生年月日（例：1990-01-01）">
  <input id="birthTime" placeholder="出生時刻（例：12:30）">
  <input id="birthPlace" placeholder="出生地（例：Tokyo）">

  <button onclick="run()">診断実行</button>

</div>

<!-- =========================
■ 結果画面
========================= -->
<div id="resultScreen" class="screen">

  <h2>診断結果</h2>

  <div id="resultText"></div>

  <canvas id="canvas" width="400" height="400"></canvas>

  <br>
  <button class="backBtn" onclick="back()">RETURN</button>

</div>

<script>

let stats = Array(64).fill(0);

// =========================
// ■ 画面切替
// =========================
function show(id){
  document.querySelectorAll(".screen")
    .forEach(e => e.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function goInput(){
  show("inputScreen");
}

function back(){
  show("inputScreen");
}

// =========================
// ■ 診断生成
// =========================
function run(){

  let place = document.getElementById("birthPlace").value;

  for(let i=0;i<64;i++){

    let bias = 0;

    if(place.includes("Tokyo")){
      if(i % 8 === 4) bias = 2;
    }

    stats[i] = Math.random()*3 + bias;
  }

  show("resultScreen");
  render();
}

// =========================
// ■ 意味定義
// =========================
function getMeaning(i){

  const m = [
    "発火","分岐","衝動","接触","反応","調整","集中","臨界",
    "違和感","比較","分類","意味付与","誤認","再解釈","確信","揺らぎ",
    "探索","試行","拡張","模倣","適応","接続","増幅","過剰",
    "構造化","安定","ルール化","反復","維持","抵抗","硬化","停滞",
    "崩壊","解体","混乱","再編","再定義","逆転","融解","転換",
    "統合","調和","融合","受容","共鳴","整列","安定化","静寂",
    "俯瞰","抽象","圧縮","透明","非局在","拡張意識","統合知","境界消失",
    "回帰","循環","完成","沈静","再起動","無","純化","完全循環"
  ];

  return m[i-1];
}

// =========================
// ■ 円マップ描画
// =========================
function draw(){

  const c = document.getElementById("canvas");
  const ctx = c.getContext("2d");

  ctx.clearRect(0,0,400,400);

  const cx = 200;
  const cy = 200;
  const r = 150;

  for(let i=0;i<64;i++){

    let angle = (Math.PI*2/64)*i;
    let v = stats[i];

    let x = cx + Math.cos(angle)*r*(v/5);
    let y = cy + Math.sin(angle)*r*(v/5);

    ctx.beginPath();
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle = "rgba(180,200,255,0.7)";
    ctx.fill();
  }

  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle = "#2a3355";
  ctx.stroke();
}

// =========================
// ■ 深層レポート
// =========================
function getReport(){

  let max = 0;
  let idx = 0;
  let total = 0;

  for(let i=0;i<64;i++){
    total += stats[i];
    if(stats[i] > max){
      max = stats[i];
      idx = i;
    }
  }

  let avg = total / 64;

  let domainScore = Array(8).fill(0);

  for(let i=0;i<64;i++){
    domainScore[i % 8] += stats[i];
  }

  let domIdx = 0;
  let domMax = 0;

  for(let i=0;i<8;i++){
    if(domainScore[i] > domMax){
      domMax = domainScore[i];
      domIdx = i;
    }
  }

  const domainName = [
    "自己認識領域",
    "関係性領域",
    "行動領域",
    "環境適応領域",
    "思考構造領域",
    "感情処理領域",
    "習慣時間領域",
    "直感統合領域"
  ];

  let today = new Date();
  let todayDomain = domainName[today.getDate() % 8];

  let weakIdx = 0;
  let weakVal = Infinity;

  for(let i=0;i<8;i++){
    if(domainScore[i] < weakVal){
      weakVal = domainScore[i];
      weakIdx = i;
    }
  }

  let variance = 0;
  for(let i=0;i<64;i++){
    variance += Math.abs(stats[i] - avg);
  }
  variance /= 64;

  let trend =
    variance > 1.8 ? "強い変動構造（外的影響優位）"
  : variance > 1.2 ? "中程度の揺らぎ（調整期）"
  : "安定構造（内的統合優位）";

  return ""
  + "■ 構造分析レポート\n\n"

  + "【コア構造】\n"
  + getMeaning(idx+1) + "\n\n"

  + "【平均構造】\n"
  + avg.toFixed(2) + "\n\n"

  + "【支配領域】\n"
  + domainName[domIdx] + "\n\n"

  + "【今日の影響領域】\n"
  + todayDomain + "\n\n"

  + "【注意領域】\n"
  + domainName[weakIdx] + "\n\n"

  + "【変化傾向】\n"
  + trend + "\n\n"

  + "【構造解釈】\n"
  + "現在は「" + domainName[domIdx] + "」を中心とした構造で動作しています。\n"
  + "同時に「" + domainName[weakIdx] + "」の補完が必要な局面です。\n\n"

  + "【行動指針】\n"
  + "・強い領域は認識して制御する\n"
  + "・弱い領域は補強ではなく循環で整える\n"
  + "・日次影響に過度に同調しない\n";
}

// =========================
// ■ 描画統合
// =========================
function render(){
  document.getElementById("resultText").innerText = getReport();
  draw();
}

</script>

</body>
</html>
