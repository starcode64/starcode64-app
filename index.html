<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>STARCODE64</title>

<style>
body{
margin:0;
background:#020617;
color:white;
font-family:-apple-system;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:360px;height:640px;
background:#0f172a;
border-radius:20px;
overflow:hidden;
position:relative;
}

.screen{
position:absolute;
width:100%;height:100%;
padding:20px;
box-sizing:border-box;
transform:translateX(100%);
transition:0.4s;
}

.active{transform:translateX(0);}

.center{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
height:100%;
}

.circle{
width:200px;height:200px;
border-radius:50%;
background:radial-gradient(circle,#facc15,#020617);
box-shadow:0 0 40px rgba(255,255,255,0.2);
margin-bottom:30px;
}

button{
padding:10px 20px;
border:none;
border-radius:10px;
background:#6366f1;
color:white;
}

.form-row{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
}

label{
width:40%;
font-size:13px;
}

input,select{
width:55%;
padding:6px;
border-radius:8px;
border:none;
}

</style>
</head>

<body>
<div class="app">

<!-- ① START -->
<div id="s1" class="screen active">
<div class="center">
<div class="circle"></div>
<button onclick="next(2)">スタート</button>
</div>
</div>

<!-- ② INPUT -->
<div id="s2" class="screen">

<h3>情報入力</h3>

<div class="form-row">
<label>今日の日付</label>
<input id="today" placeholder="20260430">
</div>

<div class="form-row">
<label>生年月日</label>
<input id="birth" placeholder="19900101">
</div>

<div class="form-row">
<label>出生時間</label>
<select id="ampm">
<option>午前</option>
<option>午後</option>
</select>
<input id="time" placeholder="2030">
</div>

<div class="form-row">
<label>出生地</label>
<input id="place" placeholder="東京都">
</div>

<button style="margin-top:20px;width:100%" onclick="go()">診断開始</button>

</div>

<!-- ③ RESULT -->
<div id="s3" class="screen">
<div id="resultText"></div>
<canvas id="cv" width="200" height="200"></canvas>
<button onclick="showDetail()">詳細</button>
</div>

<!-- ④ DETAIL -->
<div id="s4" class="screen">
<div id="detail"></div>
<canvas id="chart" width="300" height="150"></canvas>
<button onclick="next(1)">戻る</button>
</div>

</div>

<script>

let star=1,daily=1

function next(n){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById("s"+n).classList.add("active")
}

function go(){

let today = document.getElementById("today").value
let birth = document.getElementById("birth").value
let time  = document.getElementById("time").value
let place = document.getElementById("place").value
let ampm  = document.getElementById("ampm").value

if(!birth){
alert("生年月日を入力してください")
return
}

// 午前午後変換
if(ampm=="午後" && time.length==4){
let h = parseInt(time.slice(0,2)) + 12
time = h.toString() + time.slice(2)
}

// シード生成
let seed = (today + birth + time + place)
.split("")
.reduce((a,b)=>a+b.charCodeAt(0),0)

star = (seed % 64) + 1
daily = ((seed + new Date().getDate()) % 64) + 1

document.getElementById("resultText").innerText =
`本質コード：${star}
今日のコード：${daily}`

draw()
next(3)
}

function draw(){

let c=document.getElementById("cv")
let ctx=c.getContext("2d")

ctx.clearRect(0,0,200,200)

let cx=100,cy=100,r=80

function pos(code){
let a=(Math.PI*2/64)*(code-1)
return {x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r}
}

let s=pos(star)
let d=pos(daily)

ctx.beginPath()
ctx.moveTo(s.x,s.y)
ctx.lineTo(d.x,d.y)
ctx.strokeStyle="white"
ctx.stroke()

ctx.beginPath()
ctx.arc(s.x,s.y,6,0,Math.PI*2)
ctx.fillStyle="cyan"
ctx.fill()

ctx.beginPath()
ctx.arc(d.x,d.y,6,0,Math.PI*2)
ctx.fillStyle="red"
ctx.fill()
}

function showDetail(){

let txt=`
【分析】

本質コード：${star}
今日コード：${daily}

現在は${daily%2==0?"安定期":"変化期"}です。
`

document.getElementById("detail").innerText=txt

drawChart()
next(4)
}

function drawChart(){
let ctx=document.getElementById("chart").getContext("2d")

ctx.beginPath()
for(let i=0;i<10;i++){
let y=150-Math.random()*150
if(i==0) ctx.moveTo(0,y)
else ctx.lineTo(i*30,y)
}
ctx.strokeStyle="cyan"
ctx.stroke()
}

</script>
</body>
</html>
