<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スターコード64</title>

<style>
body{
  font-family: sans-serif;
  padding: 20px;
}

/* ■ 画面管理 */
.screen{
  display:none;
}

.active{
  display:block;
}

/* ■ 入力 */
input{
  display:block;
  margin:10px 0;
  padding:8px;
  width:220px;
}

/* ■ ボタン */
button{
  padding:10px 14px;
  margin-top:10px;
}

/* ■ 結果テキスト */
#resultText{
  white-space: pre-line;
  margin-top: 20px;
  padding: 10px;
  border: 1px solid #ccc;
}

/* ■ 円グラフ */
canvas{
  margin-top:20px;
  border:1px solid #ddd;
  display:block;
}
</style>
</head>

<body>

<!-- ■ スタート画面 -->
<div id="startScreen" class="screen active">

  <h1>スターコード64</h1>
  <p>あなたの構造を解析するシステム</p>

  <button onclick="goInput()">開始する</button>

</div>

<!-- ■ 入力画面 -->
<div id="inputScreen" class="screen">

  <h2>入力</h2>

  <input id="birthDate" placeholder="生年月日（例：1990-01-01）">
  <input id="birthTime" placeholder="出生時刻（例：12:30）">
  <input id="birthPlace" placeholder="出生地（例：Tokyo）">

  <button onclick="run()">診断実行</button>

</div>

<!-- ■ 結果画面 -->
<div id="resultScreen" class="screen">

  <h2>診断結果</h2>

  <div id="resultText"></div>

  <canvas id="canvas" width="400" height="400"></canvas>

  <button onclick="back()">戻る</button>

</div>

<script>

let stats = Array(64).fill(0);

// ----------------------
// ■ 画面切替
// ----------------------
function show(id){

  document.querySelectorAll(".screen")
    .forEach(e => e.classList.remove("active"));

  document.getElementById(id).classList.add("active");
}

// ----------------------
// ■ スタート → 入力
// ----------------------
function goInput(){
  show("inputScreen");
}

// ----------------------
// ■ 入力 → 診断
// ----------------------
function run(){

  let place = document.getElementById("birthPlace").value;

  for(let i=0;i<64;i++){

    let bias = 0;

    if(place.includes("Tokyo")){
      if(i % 8 === 4) bias = 2;
    }

    stats[i] = Math.random()*3 + bias;
  }

  show("resultScreen");

  render();
}

// ----------------------
// ■ 戻る
// ----------------------
function back(){
  show("inputScreen");
}

// ----------------------
// ■ 意味定義
// ----------------------
function getMeaning(i){

  const m = [
    "発火","分岐","衝動","接触","反応","調整","集中","臨界",
    "違和感","比較","分類","意味付与","誤認","再解釈","確信","揺らぎ",
    "探索","試行","拡張","模倣","適応","接続","増幅","過剰",
    "構造化","安定","ルール化","反復","維持","抵抗","硬化","停滞",
    "崩壊","解体","混乱","再編","再定義","逆転","融解","転換",
    "統合","調和","融合","受容","共鳴","整列","安定化","静寂",
    "俯瞰","抽象","圧縮","透明","非局在","拡張意識","統合知","境界消失",
    "回帰","循環","完成","沈静","再起動","無","純化","完全循環"
  ];

  return m[i-1];
}

// ----------------------
// ■ 円マップ
// ----------------------
function draw(){

  const c = document.getElementById("canvas");
  const ctx = c.getContext("2d");

  ctx.clearRect(0,0,400,400);

  const cx = 200;
  const cy = 200;
  const r = 150;

  for(let i=0;i<64;i++){

    let angle = (Math.PI*2/64)*i;
    let v = stats[i];

    let x = cx + Math.cos(angle)*r*(v/5);
    let y = cy + Math.sin(angle)*r*(v/5);

    ctx.beginPath();
    ctx.arc(x,y,3,0,Math.PI*2);
    ctx.fillStyle = "rgba(0,0,0,0.6)";
    ctx.fill();
  }

  ctx.beginPath();
  ctx.arc(cx,cy,r,0,Math.PI*2);
  ctx.strokeStyle = "#ccc";
  ctx.stroke();
}

// ----------------------
// ■ レポート
// ----------------------
function getReport(){

  let max = 0;
  let idx = 0;

  for(let i=0;i<64;i++){
    if(stats[i] > max){
      max = stats[i];
      idx = i;
    }
  }

  return ""
  + "■ 主要傾向：\n"
  + getMeaning(idx+1) + "\n\n"
  + "■ 解説：\n"
  + "この領域の性質が現在強く働いています。\n"
  + "意識的に活用することで安定します。";
}

// ----------------------
// ■ 描画
// ----------------------
function render(){

  document.getElementById("resultText").innerText = getReport();

  draw();
}

</script>

</body>
</html>
