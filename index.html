<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>STARCODE64</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:linear-gradient(180deg,#020617,#070b20);
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{text-align:center;}

.title{
font-size:32px;
margin-bottom:20px;
}

.card{
width:340px;
height:520px;
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:30px;
box-sizing:border-box;
backdrop-filter:blur(10px);
overflow:auto;
}

.screen{display:none;}
.active{display:block;}

.start{
font-size:48px;
color:#ff3b3b;
margin-top:40px;
}

canvas{
margin:20px auto;
display:block;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:none;
background:#0f172a;
color:white;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:10px;
background:linear-gradient(90deg,#6366f1,#8b5cf6);
color:white;
}

.code{
font-size:26px;
margin-top:10px;
}

.section{
margin-top:15px;
text-align:left;
font-size:14px;
line-height:1.6;
}
</style>
</head>

<body>

<div class="container">

<div class="title">STAR CODE64</div>

<div class="card">

<!-- START -->
<div id="s1" class="screen active">
<div class="start">START</div>
<canvas id="c1" width="220" height="220"></canvas>
<button onclick="next(2)">START</button>
</div>

<!-- INPUT -->
<div id="s2" class="screen">

<input id="birth" type="date">
<input id="time" type="time">
<input id="place" type="text" placeholder="出生地">

<button onclick="goResult()">診断する</button>

</div>

<!-- RESULT -->
<div id="s3" class="screen">

<div id="codeText" class="code"></div>

<canvas id="canvas" width="220" height="220"></canvas>

<button onclick="next(4)">詳細</button>

</div>

<!-- DETAIL -->
<div id="s4" class="screen">

<div class="code">診断結果</div>

<canvas id="c4" width="220" height="220"></canvas>

<div id="detail"></div>

<button onclick="next(1)">戻る</button>

</div>

</div>
</div>

<script>

let starCode=1

function next(n){
document.querySelectorAll(".screen")
.forEach(e=>e.classList.remove("active"))
document.getElementById("s"+n).classList.add("active")
}

// 診断
function goResult(){

let birth=document.getElementById("birth").value
let time=document.getElementById("time").value
let place=document.getElementById("place").value

let seed=(birth+time+place)
.split("")
.reduce((a,b)=>a+b.charCodeAt(0),0)

starCode=(seed%64)+1

document.getElementById("codeText").innerText=
"あなたのコード : "+starCode

draw("canvas")

next(3)
}

// 円描画
function draw(id){

const c=document.getElementById(id)
const ctx=c.getContext("2d")

ctx.clearRect(0,0,220,220)

let cx=110
let cy=110
let r=90

ctx.beginPath()
ctx.arc(cx,cy,r,0,Math.PI*2)
ctx.strokeStyle="#2a3a66"
ctx.stroke()

for(let i=0;i<64;i++){
let a=(Math.PI*2/64)*i
let x=cx+Math.cos(a)*r
let y=cy+Math.sin(a)*r
ctx.beginPath()
ctx.arc(x,y,1,0,Math.PI*2)
ctx.fillStyle="#444"
ctx.fill()
}

let angle=(Math.PI*2/64)*(starCode-1)
let x=cx+Math.cos(angle)*r
let y=cy+Math.sin(angle)*r

ctx.beginPath()
ctx.arc(x,y,6,0,Math.PI*2)
ctx.fillStyle="#00eaff"
ctx.fill()
}

// 詳細生成
function generateDetail(){

let type=starCode%8

const core=[
"強い自己確立型",
"直感優位型",
"創造表現型",
"安定構築型",
"変化適応型",
"関係重視型",
"探求深化型",
"拡張成功型"
]

return `
<div class="section">
■ コア特性  
${core[type]}
</div>

<div class="section">
■ 行動傾向  
外部環境よりも内的衝動に基づいて行動する傾向が強く、
流れを読むよりも自ら流れを作るタイプです。
</div>

<div class="section">
■ 思考傾向  
論理と直感の中間に位置し、独自の判断基準を持ちます。
</div>

<div class="section">
■ 注意点  
自分のペースを優先しすぎると、周囲とのズレが生じやすい。
</div>

<div class="section">
■ 今日の流れ  
小さな選択が未来に影響を与える日。
慎重さと直感のバランスが鍵。
</div>
`
}

// 詳細画面へ
document.querySelector("#s3 button").onclick = function(){
draw("c4")
document.getElementById("detail").innerHTML = generateDetail()
next(4)
}

</script>

</body>
</html>
