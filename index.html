<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スターコード64</title>

<style>
body {
  background:#0b0f1a;
  color:#fff;
  font-family: sans-serif;
  text-align:center;
}

.circle {
  width: 500px;
  height: 500px;
  border: 2px solid #2a3a55;
  border-radius: 50%;
  margin: 60px auto;
  position: relative;
  animation: rotate 30s linear infinite;
}

/* ★線を見やすく */
.segment {
  position: absolute;
  width: 2px;
  height: 250px;
  background: rgba(255,255,255,0.06);
  top: 0;
  left: 50%;
  transform-origin: bottom;
}

/* ★ここが重要修正 */
.dot {
  width: 18px;
  height: 18px;
  background: #00e5ff;
  border-radius: 50%;
  position: absolute;

  /* 中心固定をやめる */
  left: 50%;
  top: 50%;

  transform: translate(-50%, -50%);
  box-shadow: 0 0 18px #00e5ff;
  animation: blink 2.5s infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.25; }
}

@keyframes rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

button {
  padding:10px 20px;
  font-size:16px;
  margin-top:20px;
}

#codeDisplay {
  font-size: 24px;
  margin-top: 20px;
  color:#7df9ff;
}
</style>
</head>

<body>

<h2>スターコード64</h2>

<div class="circle" id="circle">
  <div class="dot" id="dot"></div>
</div>

<input id="inputCode" placeholder="コードを入力（1〜64）">
<br>
<button onclick="runCode()">実行</button>

<div id="codeDisplay">コード：--</div>

<script>

const TOTAL = 64;
const radius = 200;

// 線生成
const circle = document.getElementById("circle");

for(let i=0;i<TOTAL;i++){
  const line = document.createElement("div");
  line.className = "segment";
  line.style.transform = `rotate(${i * (360 / TOTAL)}deg)`;
  circle.appendChild(line);
}

function runCode(){
  let code = parseInt(document.getElementById("inputCode").value);

  if(isNaN(code) || code < 1 || code > 64){
    alert("1〜64を入力してください");
    return;
  }

  document.getElementById("codeDisplay").innerText = "コード：" + code;

  moveDot(code);
}

function moveDot(code){
  const dot = document.getElementById("dot");

  const angle = (code - 1) * (360 / TOTAL);
  const rad = angle * Math.PI / 180;

  const x = Math.cos(rad) * radius;
  const y = Math.sin(rad) * radius;

  // ★ここが改善ポイント（中心基準＋オフセット合成）
  dot.style.transform = `
    translate(-50%, -50%)
    translate(${x}px, ${y}px)
  `;
}

</script>

</body>
</html>
