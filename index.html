<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>スターコード64 - D段階</title>

<style>
body {
  background:#0b0f1a;
  color:#fff;
  font-family: sans-serif;
  text-align:center;
}

/* 外円 */
.outerCircle {
  width: 520px;
  height: 520px;
  border: 2px solid #2a3a55;
  border-radius: 50%;
  margin: 40px auto;
  position: relative;
  animation: rotate 40s linear infinite;
}

/* 内円 */
.innerCircle {
  width: 340px;
  height: 340px;
  border: 2px solid #3a4f6e;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%,-50%);
  animation: rotateReverse 25s linear infinite;
}

/* 分割線 */
.segment {
  position: absolute;
  width: 2px;
  height: 260px;
  background: rgba(255,255,255,0.05);
  top: 0;
  left: 50%;
  transform-origin: bottom;
}

/* 外光点 */
.dotOuter {
  width: 16px;
  height: 16px;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 18px;
  animation: blink 2.5s infinite;
}

/* 内光点 */
.dotInner {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  box-shadow: 0 0 14px;
  animation: blink 3s infinite;
}

@keyframes blink {
  0%,100% { opacity: 1; }
  50% { opacity: 0.3; }
}

@keyframes rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes rotateReverse {
  0% { transform: translate(-50%,-50%) rotate(0deg); }
  100% { transform: translate(-50%,-50%) rotate(-360deg); }
}

button {
  padding:10px 20px;
  font-size:16px;
  margin-top:20px;
}

#codeDisplay {
  font-size: 20px;
  margin-top: 20px;
  color:#7df9ff;
  line-height: 1.6;
  white-space: pre-line;
}
</style>
</head>

<body>

<h2>スターコード64 - D段階</h2>

<div class="outerCircle" id="outerCircle">
  <div class="dotOuter" id="dotOuter"></div>

  <div class="innerCircle" id="innerCircle">
    <div class="dotInner" id="dotInner"></div>
  </div>
</div>

<input id="inputCode" placeholder="コードを入力（1〜64）">
<br>
<button onclick="runCode()">実行</button>

<div id="codeDisplay">コード：--</div>

<script>

const TOTAL = 64;
const radiusOuter = 210;
const radiusInner = 120;

// 外円ライン
const outerCircle = document.getElementById("outerCircle");

for(let i=0;i<TOTAL;i++){
  const line = document.createElement("div");
  line.className = "segment";
  line.style.transform = `rotate(${i * (360 / TOTAL)}deg)`;
  outerCircle.appendChild(line);
}

// 意味マップ
const meanings = [
"起動","分岐","拡張","固定","変化","調整","統合前","完成"
];

// 層カラー生成（重要）
function getColor(code, type){
  const layer = Math.floor((code - 1) / 8);

  // 内＝暖色系グラデ
  if(type === "inner"){
    const r = 255;
    const g = 120 + layer * 10;
    const b = 60;
    return `rgb(${r},${g},${b})`;
  }

  // 外＝寒色系グラデ
  const r = 40;
  const g = 140 + layer * 8;
  const b = 255;
  return `rgb(${r},${g},${b})`;
}

function getMeaning(code){
  const base = (code - 1) % 8;
  const layer = Math.floor((code - 1) / 8) + 1;
  return `層${layer}：${meanings[base]}`;
}

function runCode(){
  let code = parseInt(document.getElementById("inputCode").value);

  if(isNaN(code) || code < 1 || code > 64){
    alert("1〜64を入力してください");
    return;
  }

  moveDots(code);

  document.getElementById("codeDisplay").innerText =
    "コード：" + code + "\n" + getMeaning(code);
}

function moveDots(code){
  const angle = (code - 1) * (360 / TOTAL);
  const rad = angle * Math.PI / 180;

  // 外円
  const xOuter = Math.cos(rad) * radiusOuter;
  const yOuter = Math.sin(rad) * radiusOuter;

  const outer = document.getElementById("dotOuter");
  outer.style.transform =
    `translate(-50%, -50%) translate(${xOuter}px, ${yOuter}px)`;
  outer.style.background = getColor(code, "outer");
  outer.style.boxShadow = `0 0 18px ${getColor(code, "outer")}`;

  // 内円
  const xInner = Math.cos(rad) * radiusInner;
  const yInner = Math.sin(rad) * radiusInner;

  const inner = document.getElementById("dotInner");
  inner.style.transform =
    `translate(-50%, -50%) translate(${xInner}px, ${yInner}px)`;
  inner.style.background = getColor(code, "inner");
  inner.style.boxShadow = `0 0 14px ${getColor(code, "inner")}`;
}

</script>

</body>
</html>
