<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>STARCODE64</title>

<style>
body{
margin:0;
background:#020617;
color:white;
font-family:-apple-system;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.app{
width:360px;height:640px;
background:#020617;
border-radius:20px;
overflow:hidden;
position:relative;
}

.screen{
position:absolute;
width:100%;height:100%;
padding:20px;
box-sizing:border-box;
transform:translateX(100%);
transition:0.4s;
}

.active{transform:translateX(0);}

.title{
text-align:center;
font-size:24px;
margin-bottom:10px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:20px;
padding:20px;
}

.center{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100%;
}

button{
padding:10px;
border:none;
border-radius:10px;
background:linear-gradient(45deg,#6366f1,#8b5cf6);
color:white;
width:80%;
margin-top:20px;
}

.form-row{
display:flex;
align-items:center;
margin-top:10px;
}

label{
width:40%;
font-size:13px;
}

input,select{
width:60%;
padding:6px;
border-radius:8px;
border:none;
}

canvas{
display:block;
margin:10px auto;
}
</style>
</head>

<body>
<div class="app">

<!-- ① START -->
<div id="s1" class="screen active">
<div class="center">
<div class="title">STARCODE64</div>
<div class="card">
<canvas id="startCircle" width="280" height="280"></canvas>
<button onclick="next(2)">スタート</button>
</div>
</div>
</div>

<!-- ② INPUT -->
<div id="s2" class="screen">
<div class="title">情報入力</div>

<div class="form-row">
<label>今日の日付</label>
<input id="today" placeholder="20260430">
</div>

<div class="form-row">
<label>生年月日</label>
<input id="birth" placeholder="19900101">
</div>

<div class="form-row">
<label>出生時間</label>
<select id="ampm">
<option>午前</option>
<option>午後</option>
</select>
<input id="time" placeholder="2030">
</div>

<div class="form-row">
<label>出生地</label>
<input id="place" placeholder="東京都">
</div>

<button onclick="go()">診断開始</button>
</div>

<!-- ③ RESULT -->
<div id="s3" class="screen">
<div class="title">あなたのコード</div>

<div class="card">
<div id="resultText"></div>
<canvas id="resultCircle" width="280" height="280"></canvas>
<button onclick="showDetail()">詳細</button>
</div>
</div>

<!-- ④ DETAIL -->
<div id="s4" class="screen">
<div class="title">診断詳細</div>
<div id="detail"></div>
<button onclick="next(1)">戻る</button>
</div>

</div>

<script>

let star=1,daily=1

function next(n){
document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"))
document.getElementById("s"+n).classList.add("active")
}

function go(){

let today=document.getElementById("today").value
let birth=document.getElementById("birth").value
let time=document.getElementById("time").value
let place=document.getElementById("place").value
let ampm=document.getElementById("ampm").value

if(!birth){
alert("生年月日を入力してください")
return
}

if(ampm=="午後" && time.length==4){
let h=parseInt(time.slice(0,2))+12
time=h.toString()+time.slice(2)
}

let seed=(today+birth+time+place)
.split("")
.reduce((a,b)=>a+b.charCodeAt(0),0)

star=(seed%64)+1
daily=((seed+new Date().getDate())%64)+1

document.getElementById("resultText").innerText=
`コード：${star}`

drawCircle("resultCircle", star)

next(3)
}

// ★ここが核心（円グラフ描画）
function drawCircle(id, code){

let c=document.getElementById(id)
let ctx=c.getContext("2d")

let w=c.width,h=c.height
let cx=w/2,cy=h/2
let r=100

ctx.clearRect(0,0,w,h)

// 外グラデーション
let grad=ctx.createRadialGradient(cx,cy,10,cx,cy,r)
grad.addColorStop(0,"#0f172a")
grad.addColorStop(1,"#020617")

ctx.beginPath()
ctx.arc(cx,cy,r,0,Math.PI*2)
ctx.fillStyle=grad
ctx.fill()

// 発光リング
ctx.beginPath()
ctx.arc(cx,cy,r,0,Math.PI*2)
ctx.strokeStyle="rgba(139,92,246,0.3)"
ctx.lineWidth=15
ctx.stroke()

// 光点位置
let angle=(Math.PI*2/64)*(code-1)
let x=cx+Math.cos(angle)*r*0.9
let y=cy+Math.sin(angle)*r*0.9

// 光点
let glow=ctx.createRadialGradient(x,y,1,x,y,20)
glow.addColorStop(0,"#fff")
glow.addColorStop(1,"rgba(255,255,0,0.2)")

ctx.beginPath()
ctx.arc(x,y,8,0,Math.PI*2)
ctx.fillStyle=glow
ctx.fill()

// 中心光
let centerGlow=ctx.createRadialGradient(cx,cy,1,cx,cy,30)
centerGlow.addColorStop(0,"#fff")
centerGlow.addColorStop(1,"rgba(255,255,0,0.1)")

ctx.beginPath()
ctx.arc(cx,cy,15,0,Math.PI*2)
ctx.fillStyle=centerGlow
ctx.fill()
}

// 初期表示
drawCircle("startCircle",10)

function showDetail(){

document.getElementById("detail").innerText=
`あなたのコード${star}は、
変化と循環のエネルギーを持っています。
`

next(4)
}

</script>
</body>
</html>
