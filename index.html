<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スターコード64</title>

<style>
body{
font-family: sans-serif;
background:linear-gradient(180deg,#020617,#0f172a,#1e1b4b);
color:white;
text-align:center;
padding:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-top:20px;
}

button{
background:#6366f1;
color:white;
border:none;
padding:12px 20px;
border-radius:8px;
font-size:16px;
}

.wheel-wrap{
margin-top:30px;
display:flex;
justify-content:center;
}

.wheel{
width:260px;
height:260px;
border-radius:50%;
background:
radial-gradient(circle at center,
rgba(99,102,241,0.2) 0%,
rgba(15,23,42,0.8) 60%,
rgba(2,6,23,1) 100%);
position:relative;
box-shadow:
0 0 40px rgba(139,92,246,0.4),
inset 0 0 30px rgba(99,102,241,0.3);
}

.center-light{
position:absolute;
width:18px;
height:18px;
border-radius:50%;
background:linear-gradient(
135deg,
#d4af37,
#ffffff,
#c0c0c0,
#ffd700
);
box-shadow:
0 0 8px rgba(255,215,0,0.9),
0 0 18px rgba(192,192,192,0.8),
0 0 30px rgba(255,255,255,0.6);
animation: pulse 3s ease-in-out infinite;
transition: all 1.2s ease;
}

@keyframes pulse{
0%{
transform:scale(0.9);
opacity:0.7;
}
50%{
transform:scale(1.3);
opacity:1;
}
100%{
transform:scale(0.9);
opacity:0.7;
}
}

</style>
</head>

<body>

<h1>スターコード64</h1>

<div class="card">
<p>あなたの意識コードを診断します</p>

<button onclick="diagnose()">診断する</button>

<h2 id="result"></h2>

<div class="wheel-wrap">
<div class="wheel" id="wheel">
<div class="center-light" id="light"></div>
</div>
</div>

</div>

<script>

function diagnose(){

let num = Math.floor(Math.random()*64)+1;

document.getElementById("result").innerText =
"あなたのコード：" + num;

moveLight(num);

}

function moveLight(num){

const light = document.getElementById("light");
const wheel = document.getElementById("wheel");

const radius = 110;
const center = 130;

const angle = (num / 64) * Math.PI * 2;

const x = center + radius * Math.cos(angle);
const y = center + radius * Math.sin(angle);

light.style.left = x + "px";
light.style.top = y + "px";

}

</script>

</body>
</html>
